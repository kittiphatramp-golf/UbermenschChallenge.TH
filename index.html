<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Happy Anniversary</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.container{
    background:rgba(0,0,0,0.25);
    padding:40px;
    border-radius:20px;
}

h1{
    font-size:48px;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:white;
    color:#ff4d6d;
    cursor:pointer;
}

button:hover{
    transform:scale(1.1);
}
</style>
</head>

<body>

<div class="container">
<h1>Happy Anniversary ❤️</h1>

<p>ขอบคุณที่อยู่ด้วยกันมาตลอด</p>

<p id="timer"></p>

<button onclick="showLove()">กดเพื่อดูเซอร์ไพรส์</button>

<p id="message"></p>
</div>

<script>

let startDate = new Date("2024-03-13");

function updateTime(){
    let now = new Date();
    let diff = now - startDate;

    let days = Math.floor(diff / (1000*60*60*24));

    document.getElementById("timer").innerHTML =
    "เราอยู่ด้วยกันมาแล้ว " + days + " วัน 💕";
}

setInterval(updateTime,1000);

function showLove(){
    document.getElementById("message").innerHTML =
    "ไม่ว่าจะผ่านไปกี่ปี เค้าก็ยังรักเธอเหมือนวันแรก ❤️";
}

</script>

</body>
</html>
